# omac default dev stack: Postgres + Redis on Alpine. Persistent named volumes,
# healthchecks, and restart:unless-stopped so they come back with the daemon.
# Values come from the sibling .env. This file is deployed to
# ~/.config/omac/services/ — edit it there; omac never clobbers your copy.
name: omac

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omac}
      POSTGRES_DB: ${POSTGRES_DB:-omac}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes compose interpolation so the container's own env is read.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-omac} -d $${POSTGRES_DB:-omac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Durable by default: AOF on, plus an RDB snapshot every 60s if >=1 key changed.
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
