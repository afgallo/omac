# omac tmux base config. Sourced from ~/.config/tmux/tmux.conf via an
# omac-managed block, so `omac update` (git pull) refreshes it with no re-wire —
# the same trick the shell rc fragments use. Ported from an Omarchy setup and
# adapted for macOS/zsh.
#
# Colors are NOT set here. The active omac theme renders
# ~/.config/tmux/omac-theme.conf (from themes/<name>/colors.toml); it is sourced
# near the bottom and `omac theme set` re-renders + live-reloads it.

# --- Terminal & true color -------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"          # true color (Ghostty, xterm-*)

# Honor the user's login shell (omac is a zsh layer; loads ~/.zprofile).
set -g default-command "${SHELL} -l"

# Focus events: lets nvim autoread and Claude notice focus changes.
set -g focus-events on

# --- Prefix: Ctrl-a --------------------------------------------------------
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# --- Splits (keep the current path) ---------------------------------------
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload config.
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# --- Pane resize (vi keys, repeatable) + zoom -----------------------------
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

# --- Usability -------------------------------------------------------------
set -g mouse on
setw -g mode-keys vi
set -g status-position top
set -g renumber-windows on
set -g status-left-length 50
set -g status-left '#S '

# --- Copy mode (vi), pipe yanks to the macOS clipboard --------------------
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
if-shell "command -v pbcopy" \
  "bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'"
unbind -T copy-mode-vi MouseDragEnd1Pane     # don't exit copy mode after a drag

# --- Plugins (TPM) ---------------------------------------------------------
# omac bootstraps TPM and installs these headlessly on `omac shell install`.
# The theme is omac's job (palette-rendered below), so no theme plugin here.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-hjkl across tmux + nvim
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # autosave + restore on start
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

# --- Theme (omac-managed; re-rendered by `omac theme set`) ----------------
# -q: stay quiet if it isn't rendered yet (before the first theme is applied).
source-file -q ~/.config/tmux/omac-theme.conf

# Initialize TPM — keep this line last.
run '~/.config/tmux/plugins/tpm/tpm'
