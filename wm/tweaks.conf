# omac macOS common tweaks — `domain key type value`, one per line.
# Applied idempotently via: defaults write <domain> <key> -<type> <value>
# Blank lines and # comments are ignored. Values are single tokens.
# (Caps Lock -> Escape is a keyboard remap, handled separately by the engine.)

# Keyboard: fast repeat, and let key-repeat work inside apps.
NSGlobalDomain KeyRepeat int 2
NSGlobalDomain InitialKeyRepeat int 15
NSGlobalDomain ApplePressAndHoldEnabled bool false

# Trackpad: three-finger drag + two-finger/clickfinger right-click.
com.apple.AppleMultitouchTrackpad TrackpadThreeFingerDrag bool true
com.apple.AppleMultitouchTrackpad TrackpadRightClick bool true

# Finder: show all extensions and the path bar.
com.apple.finder AppleShowAllExtensions bool true
com.apple.finder ShowPathbar bool true

# Dock: autohide and drop the launch animation.
com.apple.dock autohide bool true
com.apple.dock launchanim bool false
